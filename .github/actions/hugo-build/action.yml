name: Hugo build
description: Install Hugo Extended and build the site into public/

inputs:
  hugo-version:
    required: false
    default: "0.139.3"
  extended:
    required: false
    default: "true"
  base-url:
    description: If set, passed to hugo --baseURL (PR previews under github.io)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ inputs.hugo-version }}
        extended: ${{ inputs.extended }}

    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.base-url }}" ]]; then
          hugo --minify --gc --baseURL "${{ inputs.base-url }}"
        else
          hugo --minify --gc
        fi
